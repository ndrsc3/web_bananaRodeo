<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Photo Wall - Banana Rodeo</title>
    
    <!-- Meta Tags -->
    <meta property="og:site_name" content="Banana Rodeo">
    <meta property="og:title" content="Photo Wall - Banana Rodeo">
    <meta property="og:url" content="https://banana.rodeo/pages/photowall">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/icons/banana-rodeo-pin.01.png">
    
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/pages/photowall.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <meta name="robots" content="noindex, nofollow">
</head>

<body class="page-photowall">
    <!-- HEADER -->

    <!-- Gallery Wall -->
    <section class="photowall-stage">
        <div class="photowall-header">
            <span class="photowall-title">Yiayia's Wall of Bananas</span>
        </div>

        <div class="photowall-controls">
            <button id="photowall-frame-toggle" type="button" class="pw-btn">🪵 Frames: Wood</button>
            <button id="photowall-rehang" type="button" class="pw-btn">↻ Rehang the Wall</button>
        </div>

        <div class="photowall-cursorbar">
            <span class="photowall-cursorbar-label">Try on a look 👓 — pick your cursor</span>
            <div id="photowall-cursor-picker" class="photowall-cursor-picker"></div>
        </div>

        <div id="photowall-wall" class="photowall-wall theme-wood" aria-live="polite"></div>

        <p id="photowall-empty" class="photowall-empty" hidden>
            🍌 No bananas on the wall yet — check back soon.
        </p>
    </section>

    <!-- Fullscreen lightbox -->
    <div id="photowall-lightbox" class="pw-lightbox" hidden>
        <button type="button" class="pw-lb-btn pw-lb-close" data-action="close" aria-label="Close (Esc)">✕</button>
        <button type="button" class="pw-lb-btn pw-lb-prev" data-action="prev" aria-label="Previous">‹</button>
        <img class="pw-lb-img" src="" alt="Enlarged photo from Yiayia's Wall of Bananas">
        <button type="button" class="pw-lb-btn pw-lb-next" data-action="next" aria-label="Next">›</button>
    </div>

    <!-- Button: Next GIFFY -->
    <!-- <div class="section-basic-trans text-center">
        <a href="/pages/how-to-art.html">
            <img src="/assets/gifs/imagine.gif" alt="Alien - Volunteer" class="gif-icon" style="width: 10%;">       
        </a>
    </div> -->

    <!-- CHAT-MARQUEE -->

    <!-- FOOTER -->

    <script src="/src/main.ts" type="module"></script>
    <!-- Initialize photo wall -->
    <script type="module">
        import { initializePhotowall } from '/src/photowall.ts';
        document.addEventListener('DOMContentLoaded', initializePhotowall);
    </script>

  </body>
</html>
