# image-pipeline.toml — consumed by underScore knowledge/tools/process-images.py
#
#   originals → _capture/images/<intake>/   (drop raw camera files here)
#   run:        python knowledge/tools/process-images.py workSpace/web_bananaRodeo
#   result →    <output>/*.webp + manifest.json   (committed, deployed to Vercel)
#
# intake: path under underScore _capture/images/ ; output: path under this project root.

[[target]]
name     = "photowall"
intake   = "web_bananaRodeo/photowall"
output   = "public/assets/photowall"
max_edge = 1600
format   = "webp"
quality  = 80
manifest = true

# The Mantle — JCPenney-shoot photos that play in the live "digital frame".
[[target]]
name     = "mantle"
intake   = "web_bananaRodeo/mantle"
output   = "public/assets/mantle"
max_edge = 1400
format   = "webp"
quality  = 82
manifest = true

# The Mantle — one-off backdrop: the real La Finka mantle room photo (manifest
# off; subdir so it's not part of the slideshow pool's manifest).
[[target]]
name     = "mantle-backdrop"
intake   = "web_bananaRodeo/mantle-backdrop"
output   = "public/assets/mantle/backdrop"
max_edge = 1800
format   = "webp"
quality  = 85
manifest = false
