# image-pipeline.toml — consumed by underScore knowledge/tools/process-images.py
#
#   originals → _capture/images/<intake>/   (drop raw camera files here)
#   run:        python knowledge/tools/process-images.py workSpace/web_bananaRodeo
#   result →    <output>/*.webp + manifest.json   (committed, deployed to Vercel)
#
# intake: path under underScore _capture/images/ ; output: path under this project root.

# Photowall — one target per event year so the wall can filter by year.
# Each year's originals live in _capture/images/web_bananaRodeo/photowall/<year>/
# and render to their own output folder + manifest.json. The frontend
# (src/photowall.ts) reads /assets/photowall/<year>/manifest.json, defaulting
# to the most recent year. Add a new [[target]] block per new event year.

[[target]]
name     = "photowall-2024"
intake   = "web_bananaRodeo/photowall/2024"
output   = "public/assets/photowall/2024"
max_edge = 1600
format   = "webp"
quality  = 80
manifest = true

[[target]]
name     = "photowall-2025"
intake   = "web_bananaRodeo/photowall/2025"
output   = "public/assets/photowall/2025"
max_edge = 1600
format   = "webp"
quality  = 80
manifest = true

[[target]]
name     = "photowall-2026"
intake   = "web_bananaRodeo/photowall/2026"
output   = "public/assets/photowall/2026"
max_edge = 1600
format   = "webp"
quality  = 80
manifest = true

[[target]]
name     = "sponsors-2026"
intake   = "web_bananaRodeo/2026-Sponsors"
output   = "public/assets/partners/2026"
max_edge = 800
format   = "webp"
quality  = 85
manifest = false
